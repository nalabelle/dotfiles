name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run checks
        run: nix flake check

  build-chandler:
    name: Build chandler
    runs-on: native
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build chandler
        run: nix build .#homeConfigurations."nalabelle@chandler".activationPackage

  build-doyle:
    name: Build doyle
    runs-on: native
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build doyle
        run: nix build .#homeConfigurations."nalabelle@doyle".activationPackage

